name: Build Windows OSS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional version string for the installer, for example v0.2026.06.11"
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-oss:
    name: Build Windows OSS
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Prepare Warp build environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: windows
          is_self_hosted: false
          install_release_deps: false
          cache_key: windows-oss

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $innoPath = "${env:ProgramFiles(x86)}\Inno Setup 6"
          if (Test-Path $innoPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $innoPath
          }

      - name: Determine build version
        id: version
        shell: pwsh
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if ($env:REF_TYPE -eq 'tag') {
            $version = $env:REF_NAME
          } elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_RELEASE_TAG)) {
            $version = $env:INPUT_RELEASE_TAG
          } else {
            $version = "v0.0.${env:GITHUB_RUN_NUMBER}"
          }
          "release_tag=$version" >> $env:GITHUB_OUTPUT
          Write-Output "Using release tag/version: $version"

      - name: Build Windows OSS artifact
        id: bundle
        shell: pwsh
        env:
          REF_TYPE: ${{ github.ref_type }}
          NO_LICENSES: 1
          SKIP_SETTINGS_SCHEMA: 1
        run: |
          $diagnosticsDir = Join-Path $env:RUNNER_TEMP 'warp-build-diagnostics'
          New-Item -ItemType Directory -Path $diagnosticsDir -Force | Out-Null
          $buildLog = Join-Path $diagnosticsDir 'bundle.log'
          "diagnostics_dir=$diagnosticsDir" >> $env:GITHUB_OUTPUT
          "build_log=$buildLog" >> $env:GITHUB_OUTPUT

          $bundleArgs = @(
            '-CHANNEL', 'oss',
            '-ARCH', 'x64',
            '-RELEASE_TAG', '${{ steps.version.outputs.release_tag }}'
          )
          if ($env:REF_TYPE -ne 'tag') {
            $bundleArgs += '-DEBUG_BUILD'
            $bundleArgs += '-SKIP_BUILD_INSTALLER'
          }

          $bundleScript = Join-Path $PWD 'script\windows\bundle.ps1'
          $commandArgs = @(
            '-NoProfile',
            '-ExecutionPolicy', 'Bypass',
            '-File', $bundleScript
          ) + $bundleArgs

          Write-Output "Running bundle script with args: $($bundleArgs -join ' ')"
          & pwsh @commandArgs 2>&1 | Tee-Object -FilePath $buildLog
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Bundle script failed with exit code $LASTEXITCODE. See $buildLog"
            exit $LASTEXITCODE
          }

      - name: Stage portable artifact
        if: ${{ github.ref_type != 'tag' }}
        id: portable
        shell: pwsh
        env:
          NO_LICENSES: 1
          SKIP_SETTINGS_SCHEMA: 1
        run: |
          $portableDir = Join-Path $env:RUNNER_TEMP 'WarpOssPortable'
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          $binaryPath = '${{ steps.bundle.outputs.binary_path }}'
          $targetProfileDir = '${{ steps.bundle.outputs.target_profile_dir }}'
          Copy-Item -Path $binaryPath -Destination (Join-Path $portableDir 'warp-oss.exe') -Force

          $windowsAssetsDir = Join-Path $PWD 'app\assets\windows\x64'
          function Copy-FirstExistingFile {
            param(
              [String[]]$Sources,
              [String]$Destination
            )

            foreach ($source in $Sources) {
              if (Test-Path $source) {
                Copy-Item -Path $source -Destination $Destination -Force
                return $true
              }
            }

            return $false
          }

          $missingRuntimeFiles = @()
          foreach ($fileName in @(
            'conpty.dll',
            'dxcompiler.dll',
            'dxil.dll',
            'vcruntime140.dll',
            'vcruntime140_1.dll',
            'msvcp140.dll'
          )) {
            $copied = Copy-FirstExistingFile `
              -Sources @((Join-Path $targetProfileDir $fileName), (Join-Path $windowsAssetsDir $fileName)) `
              -Destination (Join-Path $portableDir $fileName)
            if (-not $copied) {
              $missingRuntimeFiles += $fileName
            }
          }

          $portableOpenConsoleDir = Join-Path $portableDir 'x64'
          New-Item -ItemType Directory -Path $portableOpenConsoleDir -Force | Out-Null
          $copiedOpenConsole = Copy-FirstExistingFile `
            -Sources @((Join-Path $targetProfileDir 'x64\OpenConsole.exe'), (Join-Path $windowsAssetsDir 'OpenConsole.exe')) `
            -Destination (Join-Path $portableOpenConsoleDir 'OpenConsole.exe')
          if (-not $copiedOpenConsole) {
            $missingRuntimeFiles += 'x64\OpenConsole.exe'
          }

          if ($missingRuntimeFiles.Count -gt 0) {
            throw "Missing runtime files: $($missingRuntimeFiles -join ', ')"
          }

          $resourcesDir = Join-Path $targetProfileDir 'resources'
          & .\script\windows\prepare_bundled_resources.ps1 -DestinationDir $resourcesDir -Channel 'oss' -CargoProfile 'dev'
          if (-not $?) {
            throw 'Failed to prepare bundled resources for portable artifact'
          }
          if (Test-Path $resourcesDir) {
            Copy-Item -Path $resourcesDir -Destination (Join-Path $portableDir 'resources') -Recurse -Force
          }

          $bootstrapPath = Join-Path $PWD 'app\assets\bundled\bootstrap\pwsh.ps1'
          if (Test-Path $bootstrapPath) {
            Copy-Item -Path $bootstrapPath -Destination (Join-Path $portableDir 'pwsh.ps1') -Force
          }

          $iconPath = Join-Path $PWD 'app\channels\oss\icon\no-padding\icon.ico'
          if (Test-Path $iconPath) {
            Copy-Item -Path $iconPath -Destination (Join-Path $portableDir 'icon.ico') -Force
          }

          Get-ChildItem -Path $portableDir -Recurse | Select-Object FullName, Length
          "portable_path=$portableDir" >> $env:GITHUB_OUTPUT

      - name: Upload portable artifact
        if: ${{ github.ref_type != 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: WarpOssPortable-windows-x64
          path: ${{ steps.portable.outputs.portable_path }}
          if-no-files-found: error

      - name: Upload installer artifact
        if: ${{ github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: WarpOssSetup-windows-x64
          path: ${{ steps.bundle.outputs.installer_path }}
          if-no-files-found: error

      - name: Upload build diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: WarpOssBuildDiagnostics-windows-x64
          path: ${{ steps.bundle.outputs.diagnostics_dir }}
          if-no-files-found: warn

      - name: Upload installer to GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Warp OSS ${{ github.ref_name }}
          files: ${{ steps.bundle.outputs.installer_path }}
